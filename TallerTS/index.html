<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Warcraft 3</title>
</head>
<body>

<div class="container-fluid mt-5">

    <h2 class="text-center" id="titulo"></h2>

    <div class="row mt-5">
        <div class="col">
            <h2 class="text-center">Descripción del juego</h2>
            <p class="text-center mt-4" id="descripcion"></p>
            <p class="text-center" id="descripcionLarga"></p>
        </div>
        <div class="col">
            <h2 class="text-center">Imagen</h2>
            <div class="text-center mt-4">
                <img id="imagenPortada" class="img-fluid w-50" src="" alt="">
            </div>
        </div>
    </div>

    <div class="row mt-5">
        <h2 class="text-center">Personajes principales</h2>
        <div class="row row-cols-3 g-4 mt-2" id="personajes">
            <!-- Las cards se generan desde main.ts -->
        </div>
    </div>

</div>

<!-- Se carga el JS compilado desde /dist -->
<script type="module" src="./dist/main.js"></script>

</body>
</html>
